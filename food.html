<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Food</title></head>
<body>
<h2 data-edit="food-title">Food</h2>
<p data-edit="food-desc">Our beautiful food</p>

<script>
let edit = false;

// CREATE EDIT BUTTON
const btn = document.createElement("button");
btn.innerText = "✏️ Edit";
btn.style.position = "fixed";
btn.style.bottom = "20px";
btn.style.right = "20px";
btn.style.zIndex = "9999";
document.body.appendChild(btn);

// TOGGLE EDIT MODE
btn.onclick = ()=>{
  edit = !edit;

  document.querySelectorAll("[data-edit]").forEach(el=>{
    el.contentEditable = edit;
    el.style.outline = edit ? "2px dashed red" : "none";
  });

  // SAVE WHEN EXIT EDIT
  if(!edit){
    const data = {};

    document.querySelectorAll("[data-edit]").forEach(el=>{
      data[el.dataset.edit] = el.innerHTML;
    });

    localStorage.setItem("foodContent", JSON.stringify(data));
    alert("Saved!");
  }
};

// LOAD SAVED CONTENT
const saved = localStorage.getItem("foodContent");

if(saved){
  const data = JSON.parse(saved);

  document.querySelectorAll("[data-edit]").forEach(el=>{
    if(data[el.dataset.edit]){
      el.innerHTML = data[el.dataset.edit];
    }
  });
}
</script>

</body>
</html>
