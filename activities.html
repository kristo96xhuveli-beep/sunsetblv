<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Activities</title></head>
<body>
<h2 data-edit="activities-title">Activities</h2>
<p data-edit="activities-desc">Our beautiful activities</p>

<script>
document.addEventListener("DOMContentLoaded", () => {

let edit = false;

// BUTTON
const btn = document.createElement("button");
btn.innerText = "✏️ Edit";
btn.style.position = "fixed";
btn.style.bottom = "20px";
btn.style.right = "20px";
btn.style.zIndex = "9999";
document.body.appendChild(btn);

// PREVENT NAVIGATION
document.addEventListener("click", function(e){
  if(edit){
    const link = e.target.closest("a");
    if(link){
      e.preventDefault();
    }
  }
});

// TOGGLE EDIT
btn.onclick = ()=>{
  edit = !edit;

  document.querySelectorAll("[data-edit]").forEach(el=>{
    el.contentEditable = edit;
    el.style.outline = edit ? "2px dashed red" : "none";
  });

  // SAVE
  if(!edit){
    const data = JSON.parse(localStorage.getItem("siteContent") || "{}");

    document.querySelectorAll("[data-edit]").forEach(el=>{
      data[el.dataset.edit] = el.innerHTML;
    });

    localStorage.setItem("siteContent", JSON.stringify(data));
    alert("Saved!");
  }
};

// LOAD
const saved = JSON.parse(localStorage.getItem("siteContent") || "{}");

document.querySelectorAll("[data-edit]").forEach(el=>{
  if(saved[el.dataset.edit]){
    el.innerHTML = saved[el.dataset.edit];
  }
});

});
</script>
</body>
</html>
